<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PayWay Freelance{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f7fb;
            color: #222;
        }

        .navbar {
            background: #111827;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 18px;
            font-weight: 600;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            color: #38bdf8;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        h1, h2, h3 {
            margin-bottom: 16px;
        }

        p {
            margin-bottom: 12px;
            line-height: 1.6;
        }

        a.btn, button {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        a.btn.secondary {
            background: #10b981;
        }

        form p {
            margin-bottom: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            margin-top: 6px;
        }

        .job-item {
            border: 1px solid #e5e7eb;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 16px;
            background: #fff;
        }

        .job-item a {
            text-decoration: none;
            color: #111827;
            font-size: 20px;
            font-weight: 700;
        }

        .muted {
            color: #6b7280;
        }

        .bid-box {
            border: 1px solid #e5e7eb;
            background: #fafafa;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">PayWay Freelance</div>
        <div>
            <a href="/">Home</a>
            {% if request.user.is_authenticated %}
                <a href="/profile/">Profile</a>
                <a href="/post-job/">Post Job</a>
                <a href="/logout/">Logout</a>
            {% else %}
                <a href="/login/">Login</a>
                <a href="/register/">Register</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
