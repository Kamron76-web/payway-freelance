{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="card">
    <h1>Kirish</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <p>
            <label>Username</label>
            <input type="text" name="username">
        </p>

        <p>
            <label>Password</label>
            <input type="password" name="password">
        </p>

        <button type="submit">Kirish</button>
    </form>
</div>
{% endblock %}
